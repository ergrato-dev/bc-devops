<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">

  <!-- Fondo principal -->
  <rect width="900" height="220" fill="#0d1117"/>

  <!-- Borde acento izquierdo -->
  <rect x="0" y="0" width="6" height="220" fill="#e67e22"/>

  <!-- Panel de nombre del bootcamp -->
  <rect x="36" y="30" width="565" height="70" rx="8" fill="#161b22"/>
  <rect x="36" y="30" width="6" height="70" rx="3" fill="#e67e22"/>

  <!-- Título principal -->
  <text x="58" y="63" font-family="Inter, Roboto, Arial, sans-serif" font-size="28" font-weight="800" fill="#e6edf3" letter-spacing="-0.5">Bootcamp DevOps</text>
  <text x="58" y="87" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="400" fill="#7d8590" letter-spacing="1">ZERO TO HERO · DEVOPS / SRE JUNIOR</text>

  <!-- Stat cards -->

  <!-- Card 1: Semanas -->
  <rect x="36" y="118" width="102" height="60" rx="8" fill="#161b22" stroke="#e67e22" stroke-width="1.5"/>
  <text x="87" y="144" font-family="Inter, Roboto, Arial, sans-serif" font-size="22" font-weight="800" fill="#e67e22" text-anchor="middle">28</text>
  <text x="87" y="164" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">SEMANAS</text>

  <!-- Card 2: Horas -->
  <rect x="152" y="118" width="102" height="60" rx="8" fill="#161b22" stroke="#e67e22" stroke-width="1.5"/>
  <text x="203" y="144" font-family="Inter, Roboto, Arial, sans-serif" font-size="22" font-weight="800" fill="#e67e22" text-anchor="middle">224</text>
  <text x="203" y="164" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">HORAS</text>

  <!-- Card 3: Nivel de salida -->
  <rect x="268" y="118" width="162" height="60" rx="8" fill="#161b22" stroke="#e67e22" stroke-width="1.5"/>
  <text x="349" y="144" font-family="Inter, Roboto, Arial, sans-serif" font-size="13" font-weight="700" fill="#e6edf3" text-anchor="middle">DevOps / SRE</text>
  <text x="349" y="164" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">NIVEL DE SALIDA</text>

  <!-- Card 4: Stages -->
  <rect x="444" y="118" width="157" height="60" rx="8" fill="#161b22" stroke="#e67e22" stroke-width="1.5"/>
  <text x="522" y="144" font-family="Inter, Roboto, Arial, sans-serif" font-size="14" font-weight="700" fill="#e67e22" text-anchor="middle">4 Stages</text>
  <text x="522" y="164" font-family="Inter, Roboto, Arial, sans-serif" font-size="11" fill="#7d8590" text-anchor="middle">Linux · K8s · IaC · SRE</text>

  <!-- Separador vertical decorativo -->
  <line x1="626" y1="30" x2="626" y2="190" stroke="#161b22" stroke-width="1.5"/>

  <!-- Panel derecho: comandos shell decorativos -->
  <text x="648" y="58"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590">$</text>
  <text x="660" y="58"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#e67e22">kubectl</text>
  <text x="725" y="58"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">get pods</text>

  <text x="648" y="79"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590">$</text>
  <text x="660" y="79"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#58a6ff">terraform</text>
  <text x="733" y="79"  font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">apply</text>

  <text x="648" y="100" font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590">$</text>
  <text x="660" y="100" font-family="'Courier New', Courier, monospace" font-size="12" fill="#3fb950">docker</text>
  <text x="710" y="100" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">build .</text>

  <text x="648" y="121" font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590">$</text>
  <text x="660" y="121" font-family="'Courier New', Courier, monospace" font-size="12" fill="#d2a8ff">argocd</text>
  <text x="713" y="121" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">app sync</text>

  <text x="648" y="142" font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590">$</text>
  <text x="660" y="142" font-family="'Courier New', Courier, monospace" font-size="12" fill="#ffa657">promtool</text>
  <text x="726" y="142" font-family="'Courier New', Courier, monospace" font-size="12" fill="#e6edf3">check</text>

  <text x="648" y="163" font-family="'Courier New', Courier, monospace" font-size="12" fill="#7d8590"># 28 semanas · zero to hero</text>

  <!-- Línea inferior acento -->
  <rect x="0" y="214" width="900" height="6" fill="#e67e22" rx="0"/>

</svg>
